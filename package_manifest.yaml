# SPDX-License-Identifier: MulanPSL-2.0
#
# exterior_camera_rbnx — V4L2 USB camera publisher for the
# "exterior" view in the piper_grasp VLA pipeline.
#
# Owns the `robonix/primitive/camera_exterior/*` namespace. Sibling
# to OrbbecSDK_rbnx (which owns `primitive/camera/*` for the Orbbec
# Dabai DCW depth-aware camera). The exterior camera is a plain USB
# color camera; it has no depth, no camera_info — only the RGB stream
# that vla_client consumes as the VLA "full image" input.
#
# Lifecycle (Robonix developer guide §5):
#   CMD_INIT     -> on_init: light cfg validation only.
#   CMD_ACTIVATE -> on_activate: spawn the camera publisher subprocess,
#                   wait for the first sensor_msgs/Image to confirm
#                   the V4L2 device is alive, atlas-declare the
#                   `image` topic. ~1-3s on a healthy device.
#   CMD_DEACTIVATE -> on_deactivate: kill subprocess, idempotent.
#   CMD_SHUTDOWN -> on_shutdown: last-chance kill.
#
# Capability surface:
#   primitive/camera_exterior/driver  mode=rpc        transport=gRPC  (auto-declared)
#   primitive/camera_exterior/image   mode=topic_out  transport=ROS2  sensor_msgs/Image
#
# Both contracts are package-level (see capabilities/primitive/
# camera_exterior/*.v1.toml). The driver IDL is the standard
# `lifecycle/srv/Driver.srv` so codegen reuses the existing servicer.
#
# Config (delivered via Driver(CMD_INIT, config_json) from the
# manifest's primitive[].config block):
#   device              default "/dev/video11"  — V4L2 device path
#   topic               default "/exterior_camera/color/image_raw"
#   frame_id            default "exterior_camera"
#   fps                 default 30.0            — publish rate target
#   width               default 0               — 0 = use device default
#   height              default 0
#   encoding            default "bgr8"          — bgr8 | rgb8
#   buffer_size         default 1               — V4L2 internal buffers
#   sentinel_timeout_s  default 10.0            — wait for first frame
manifestVersion: 1

package:
  name: com.robonix.piper_grasp.exterior_camera
  version: 0.2.0
  vendor: robonix
  description: V4L2 exterior USB camera primitive — declares image topic for the VLA exterior view.
  license: MulanPSL-2.0

build: bash scripts/build.sh
start: bash scripts/start.sh

capabilities:
  - name: robonix/primitive/camera_exterior/driver
  - name: robonix/primitive/camera_exterior/image
